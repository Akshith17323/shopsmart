name: Unit Tests

on:
  push:
    branches: [ main, testing ]
  pull_request:
    branches: [ main, testing ]

jobs:
  backend-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Backend Dependencies
        run: npm install
        working-directory: ./server 

      - name: Run Backend Linting
        run: npm run lint
        working-directory: ./server

      - name: Run Backend Unit Tests (Jest)
        run: npm test
        working-directory: ./server
        env:
          NODE_ENV: test

      - name: Store the logs of the test
        uses: actions/upload-artifact@v4
        with:
          name: backend_unit_tests_logs
          path: logs/*
          overwrite: true
          retention-days: 30

  frontend-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Frontend Dependencies
        run: npm install
        working-directory: ./client

      - name: Run Frontend Linting
        run: npm run lint
        working-directory: ./client

      - name: Run Frontend Unit Tests (Vitest)
        run: npm run test:unit
        working-directory: ./client
        env:
          CI: true
      - name: Store the logs of the test
        uses: actions/upload-artifact@v4
        with:
          name: frontend_tests_logs
          path: logs/*
          overwrite: true
          retention-days: 30
