name: AWS Deployment

on:
  push:
    branches: [ main, testing ]
  pull_request:
    branches: [ main, testing ]

permissions:
  contents: read

jobs:
  backend-testing:
    name: "Backend: Unit Testing & Linting"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Backend Dependencies
        run: npm install
        working-directory: ./server 
      - name: Run Backend Linting
        run: npm run lint
        working-directory: ./server
      - name: Run Backend Unit Tests (Jest)
        run: |
          mkdir -p logs
          npm test -- --json --outputFile=logs/jest-results.json
        working-directory: ./server
        env:
          NODE_ENV: test
      - name: Store the logs of the test
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: backend_unit_tests_logs
          path: server/logs/*
          overwrite: true
          retention-days: 30

  frontend-testing:
    name: "Frontend: Unit Testing & Linting"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Frontend Dependencies
        run: npm install
        working-directory: ./client
      - name: Run Frontend Linting
        run: npm run lint
        working-directory: ./client
      - name: Run Frontend Unit Tests (Vitest)
        run: |
          mkdir -p logs
          npm run test:unit -- --reporter=default --reporter=json --outputFile=logs/vitest-unit-results.json
        working-directory: ./client
        env:
          CI: true
      - name: Store the logs of the test
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: frontend_tests_logs
          path: client/logs/*
          overwrite: true
          retention-days: 30

  e2e-integration-testing:
    name: "Frontend: E2E Integration Testing"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Frontend Dependencies
        run: npm install
        working-directory: ./client
      - name: Run Frontend Integration Tests (Vitest & MSW)
        run: |
          mkdir -p logs
          npm run test:integration -- --reporter=default --reporter=json --outputFile=logs/vitest-integration-results.json
        working-directory: ./client
        env:
          CI: true
      - name: Store the logs of the test
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: integration_tests_logs
          path: client/logs/
          overwrite: true
          retention-days: 30

  infrastructure-provisioning:
    name: "AWS: S3 Bucket Provisioning"
    runs-on: ubuntu-latest
    needs: [backend-testing, frontend-testing, e2e-integration-testing]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -out=tfplan

      - name: Terraform Apply
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: terraform apply -auto-approve tfplan
