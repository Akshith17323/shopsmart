name: AWS Deployment

on:
  push:
    branches: [ main, testing ]
  pull_request:
    branches: [ main, testing ]

permissions:
  contents: read

jobs:
  backend-testing:
    name: "Backend: Unit Testing & Linting"
    needs: [frontend-testing]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Backend Dependencies
        run: npm install
        working-directory: ./server 
      - name: Run Backend Linting
        run: npm run lint
        working-directory: ./server
      - name: Run Backend Unit Tests (Jest)
        run: |
          mkdir -p logs
          npm test -- --json --outputFile=logs/jest-results.json
        working-directory: ./server
        env:
          NODE_ENV: test
      - name: Store the logs of the test
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: backend_unit_tests_logs
          path: server/logs/*
          overwrite: true
          retention-days: 30

  frontend-testing:
    name: "Frontend: Unit Testing & Linting"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Frontend Dependencies
        run: npm install
        working-directory: ./client
      - name: Run Frontend Linting
        run: npm run lint
        working-directory: ./client
      - name: Run Frontend Unit Tests (Vitest)
        run: |
          mkdir -p logs
          npm run test:unit -- --reporter=default --reporter=json --outputFile=logs/vitest-unit-results.json
        working-directory: ./client
        env:
          CI: true
      - name: Store the logs of the test
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: frontend_tests_logs
          path: client/logs/*
          overwrite: true
          retention-days: 30

  integration-testing:
    name: "Frontend Integration Testing"
    needs: [backend-testing]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Frontend Dependencies
        run: npm install
        working-directory: ./client
      - name: Run Frontend Integration Tests (Vitest & MSW)
        run: |
          mkdir -p logs
          npm run test:integration -- --reporter=default --reporter=json --outputFile=logs/vitest-integration-results.json
        working-directory: ./client
        env:
          CI: true
      - name: Store the logs of the test
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: integration_tests_logs
          path: client/logs/
          overwrite: true
          retention-days: 30

  infrastructure-provisioning:
    name: "AWS: S3 Bucket Provisioning"
    runs-on: ubuntu-latest
    needs: [integration-testing]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"

      - name: Terraform Init
        run: terraform init
        working-directory: ./terraform

      - name: Terraform Validate
        run: terraform validate
        working-directory: ./terraform

      - name: Import Existing Resources (Idempotency Hack)
        # If the runner lost state, this imports the bucket so Terraform knows it already exists.
        run: terraform import aws_s3_bucket.app_bucket shopsmart-bucket-akshith17323 || true
        working-directory: ./terraform

      - name: Terraform Plan
        run: terraform plan -out=tfplan
        working-directory: ./terraform

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan
        working-directory: ./terraform

  container-build-deploy:
    name: "AWS: ECR Build & ECS Deploy"
    runs-on: ubuntu-latest
    needs: [infrastructure-provisioning]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to Amazon ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: shopsmart-repo
          IMAGE_TAG: ${{ github.sha }}
        run: |
          # Build a docker container and push it to ECR
          # Assumes the Dockerfile is in the root directory or adjust path accordingly
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Download Task Definition
        run: |
          aws ecs describe-task-definition --task-definition shopsmart-task \
          --query taskDefinition > task-definition.json

      - name: Fill in the new image ID in the Amazon ECS task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: shopsmart-container
          image: ${{ steps.build-image.outputs.image }}

      - name: Deploy Amazon ECS task definition
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: shopsmart-service
          cluster: shopsmart-cluster
          wait-for-service-stability: true
