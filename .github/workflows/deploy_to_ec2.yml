name: Deploy to VM

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VM using SSH
        uses: appleboy/ssh-action@v1.0.3

        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: true
          script: |
            cd /home/ubuntu/shopsmart
            git pull origin main
            
            echo "Restarting backend..."
            cd server
            npm install
            pkill node || true  
            nohup node src/index.js > server.log 2>&1 &
            
            echo "Rebuilding frontend..."
            cd ../client
            npm install
            npm run build