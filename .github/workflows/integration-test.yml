name: Integration Tests

on:
  push:
    branches: [ main, testing ]
  pull_request:
    branches: [ main, testing ]

jobs:
  run-integration-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Frontend Dependencies
        run: npm install
        working-directory: ./client

      - name: Run Frontend Integration Tests (Vitest & MSW)
        run: |
          mkdir -p logs
          npm run test:integration -- --reporter=default --reporter=json --outputFile=logs/vitest-integration-results.json
        working-directory: ./client
        env:
          CI: true
        
      - name: Store the logs of the test
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: integration_tests_logs
          path: client/logs/
          overwrite: true
          retention-days: 30